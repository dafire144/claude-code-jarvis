<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root{
    --amber:#E8B24A; --bright:#F4C25C; --mut:#BE9E6C; --deep:#8A6A2E;
    --text:#DCCDAB; --online:#86E3A6; --border:#C9A877; --faint:#6C786E; --red:#E8794C;
    --ink1:#121F17; --ink2:#070E09;
    --mono:'Consolas','SF Mono','JetBrains Mono',ui-monospace,monospace;
    --ui:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
  }
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;-webkit-user-select:none;user-select:none;cursor:default}
  .hud{
    position:relative;width:380px;height:300px;border-radius:16px;overflow:hidden;
    background:linear-gradient(150deg,var(--ink1),var(--ink2));
    border:1.3px solid rgba(201,168,119,.82);
    box-shadow:0 10px 40px rgba(0,0,0,.5),inset 0 0 60px rgba(232,178,74,.03);
    color:var(--text);will-change:filter,transform;transform-origin:center center;
  }
  .drag{position:absolute;top:0;left:0;right:26px;height:34px;-webkit-app-region:drag}
  .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.03em;color:var(--faint);text-transform:uppercase}
  .amber{color:var(--amber)} .deep{color:var(--deep)}
  /* header */
  .head{position:absolute;top:11px;left:14px;right:12px;display:flex;align-items:center;justify-content:space-between}
  .brand{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:.02em;color:var(--amber)}
  .hstat{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8.5px;font-weight:700}
  .hago{color:var(--online)} .dot{width:7px;height:7px;border-radius:50%;background:var(--online);box-shadow:0 0 7px currentColor}
  .pill{display:flex;align-items:center;gap:6px;padding:2.5px 8px;border-radius:8px;border:1px solid transparent}
  .stxt{color:var(--online);letter-spacing:.05em}
  .close{color:var(--faint);font-family:var(--mono);font-size:12px;cursor:pointer;-webkit-app-region:no-drag;padding:0 3px}
  .close:hover{color:var(--amber)}
  .min{color:var(--faint);font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;-webkit-app-region:no-drag;padding:0 3px;line-height:1}
  .min:hover{color:var(--amber)}
  /* MINI-CAPSULA: a telinha colapsa numa pilula reator no canto; clique restaura */
  #minicap{position:absolute;inset:0;display:none;border-radius:27px;overflow:hidden;background:linear-gradient(60deg,var(--ink1),var(--ink2));border:1.3px solid rgba(201,168,119,.82);box-shadow:0 8px 26px rgba(0,0,0,.5);cursor:pointer;-webkit-app-region:drag}
  #minicap.fable{background:linear-gradient(60deg,#26150A,#0F0603);border-color:rgba(255,122,60,.92)}
  body.minimized #minicap{display:block}
  body.minimized .hud{display:none}
  #minicap canvas{position:absolute;left:6px;top:5px;width:44px;height:44px;-webkit-app-region:no-drag}
  #minicap .mt1{position:absolute;left:56px;top:7px;right:22px;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--amber);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #minicap .mt2{position:absolute;left:56px;top:26px;right:16px;font-family:var(--mono);font-size:9px;color:var(--online);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #minicap .mx{position:absolute;right:8px;top:4px;font-family:var(--mono);font-size:11px;color:var(--faint);-webkit-app-region:no-drag;cursor:pointer;padding:2px}
  #minicap .mx:hover{color:var(--amber)}
  /* modo FABLE 5 (classe Mythos): badge ouro-branco cintilante + moldura elevada */
  #fbadge{display:none;margin-left:8px;vertical-align:2px;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.08em;color:#FFF4DC;border:1px solid rgba(255,217,138,.8);border-radius:3px;padding:1.5px 6px;background:linear-gradient(110deg,rgba(255,217,138,.10) 25%,rgba(255,244,220,.42) 50%,rgba(255,217,138,.10) 75%);background-size:220% 100%;animation:fshine 2.8s linear infinite;text-shadow:0 0 7px rgba(255,217,138,.75)}
  @keyframes fshine{0%{background-position:200% 0}100%{background-position:-120% 0}}
  /* transicao cinematica entre modos: as cores do DOM deslizam junto com o heat */
  .hud,#stxt,#fbadge,.mv,.m,.lbl,.bar > i,#dot{transition:color 1.3s ease,background-color 1.3s ease,border-color 1.3s ease,box-shadow 1.3s ease,opacity 1.3s ease}
  /* OVERHEAT: fundo aquecido + moldura pulsando entre ouro e brasa (forca total) */
  .hud.fable{background:linear-gradient(150deg,#26150A,#0F0603);animation:hudheat 2.5s ease-in-out infinite alternate}
  @keyframes hudheat{
    0%{border-color:rgba(255,217,138,.92);box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 26px rgba(255,217,138,.22),inset 0 0 60px rgba(255,217,138,.05)}
    100%{border-color:rgba(255,122,60,.95);box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 30px rgba(255,122,60,.30),inset 0 0 60px rgba(255,122,60,.07)}
  }
  .sess{position:absolute;top:31px;left:15px;right:14px;font-family:var(--mono);font-size:9px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #mtag{position:absolute;top:33px;right:14px;font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.05em}
  /* acabamento holografico: grade blueprint (fundo) + vidro com scanlines e vinheta (topo) */
  .grid{position:absolute;inset:0;border-radius:16px;pointer-events:none;background:
    repeating-linear-gradient(90deg,rgba(201,168,119,.035) 0 1px,transparent 1px 32px),
    repeating-linear-gradient(0deg,rgba(201,168,119,.035) 0 1px,transparent 1px 32px)}
  .glass{position:absolute;inset:0;border-radius:16px;pointer-events:none;z-index:8;background:
    radial-gradient(135% 120% at 50% 42%,rgba(0,0,0,0) 55%,rgba(0,0,0,.26) 100%),
    repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 1px,transparent 1px 3px)}
  .corner{position:absolute;width:22px;height:22px;z-index:7;pointer-events:none;border:1.3px solid rgba(201,168,119,.32)}
  #c1{left:5px;top:5px;border-right:none;border-bottom:none;border-top-left-radius:13px}
  #c2{right:5px;top:5px;border-left:none;border-bottom:none;border-top-right-radius:13px}
  #c3{right:5px;bottom:5px;border-left:none;border-top:none;border-bottom-right-radius:13px}
  #c4{left:5px;bottom:5px;border-right:none;border-top:none;border-bottom-left-radius:13px}
  /* reactor */
  #reactor{position:absolute;left:12px;top:50px;width:80px;height:80px}
  /* metrics */
  .m{position:absolute;font-family:var(--mono)}
  .mv{font-family:var(--mono);font-weight:700;color:var(--amber);line-height:1}
  #tempoL{left:100px;top:50px}   #tempoV{left:99px;top:59px;font-size:19px}
  #acoesL{left:100px;top:84px}   #acoesV{left:99px;top:92px;font-size:16px}
  #acoesU{left:135px;top:103px;font-size:8px;color:var(--deep)}
  #cargaL{left:210px;top:50px}
  .bar{position:absolute;left:210px;top:64px;width:112px;height:9px;border-radius:5px;background:rgba(6,11,8,.6);border:1px solid rgba(201,168,119,.28);overflow:hidden}
  .bar > i{display:block;height:100%;width:0;border-radius:5px;background:linear-gradient(90deg,var(--deep),var(--bright))}
  .bar::after{content:'';position:absolute;left:1px;right:1px;top:1px;height:45%;border-radius:4px;background:rgba(255,255,255,.09)}
  #peak{position:absolute;top:62px;width:2px;height:13px;background:var(--bright);box-shadow:0 0 6px rgba(244,194,92,.85);opacity:0;z-index:2}
  #cargaP{left:328px;top:60px;font-size:8.5px;font-weight:700}
  #cargaS{left:210px;top:75px;font-size:8px;color:var(--deep)}
  #apmL{left:210px;top:84px}     #apmV{left:209px;top:92px;font-size:16px}
  #trend{position:absolute;left:238px;top:99px;font-family:var(--mono);font-size:10px}
  #apmPk{left:252px;top:101px;font-size:8px;color:var(--deep)}
  /* sparkline */
  #spark{position:absolute;left:100px;top:115px;width:256px;height:15px;display:flex;align-items:flex-end;gap:2px}
  #spark > i{flex:1;background:var(--deep);border-radius:1px;min-height:2px}
  /* feed */
  .divider{position:absolute;left:16px;right:16px;top:133px;height:1px;background:rgba(201,168,119,.19)}
  #feedhead{left:15px;top:139px}
  #eventsC{position:absolute;right:16px;top:140px;font-family:var(--mono);font-size:8px;color:var(--deep)}
  #feed{position:absolute;left:16px;right:14px;top:157px;font-family:var(--ui);font-size:12px}
  .frow{position:relative;display:flex;align-items:center;gap:8px;height:16.5px}
  .chip{flex:none;width:40px;text-align:center;font-family:var(--mono);font-weight:700;font-size:8px;padding:1.5px 0;border-radius:3px;border:1px solid currentColor;background:rgba(255,255,255,.045)}
  .ftxt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mut)}
  .frow:last-child .ftxt{color:var(--text)}
  .acc{position:absolute;left:-9px;top:2px;width:2px;height:12px;background:var(--bright);box-shadow:0 0 5px rgba(244,194,92,.6)}
  .crtline{position:absolute;left:0;right:0;top:149px;height:3px;background:#DCEEFF;box-shadow:0 0 14px 3px rgba(150,210,245,.9);opacity:0;pointer-events:none;z-index:12}
  /* IGNICAO (boot): fisga de luz + linha CRT quentes fora do .hud; flare e letreiro dentro */
  #bdot{position:absolute;left:184px;top:144px;width:12px;height:12px;border-radius:50%;background:#FFF4D6;box-shadow:0 0 22px 8px rgba(244,194,92,.8);display:none;z-index:40}
  #bline{position:absolute;left:0;right:0;top:148.5px;height:3px;background:#FFF4D6;box-shadow:0 0 16px 4px rgba(232,178,74,.85);opacity:0;z-index:40;transform-origin:center}
  #bootflare{position:absolute;left:12px;top:50px;width:80px;height:80px;border-radius:50%;pointer-events:none;z-index:9;opacity:0;background:radial-gradient(circle,rgba(255,244,214,.85) 0%,rgba(244,194,92,.45) 45%,rgba(244,194,92,0) 72%)}
  #boottext{position:absolute;left:15px;bottom:14px;font-family:var(--mono);font-size:9px;color:var(--mut);opacity:0;z-index:14}
</style>
</head>
<body>
<div class="hud" id="hud">
  <div class="grid"></div>
  <div class="drag"></div>
  <div class="head">
    <div class="brand">J.A.R.V.I.S.<span id="fbadge">✦ FABLE 5</span></div>
    <div class="hstat"><span class="hago" id="hago"></span><span class="pill" id="pill"><span class="dot" id="dot"></span><span class="stxt" id="stxt">ONLINE</span></span><span class="min" id="min">–</span><span class="close" id="close">×</span></div>
  </div>
  <div class="sess" id="sess">// sessao</div>
  <div id="mtag"></div>
  <div id="peak"></div>
  <div id="bootflare"></div>
  <div id="boottext"></div>
  <div class="glass"></div>
  <div class="corner" id="c1"></div><div class="corner" id="c2"></div><div class="corner" id="c3"></div><div class="corner" id="c4"></div>
  <canvas id="reactor" width="160" height="160"></canvas>
  <canvas id="fx" width="760" height="600" style="position:absolute;left:0;top:0;width:380px;height:300px;pointer-events:none;z-index:5"></canvas>
  <div class="m lbl" id="tempoL">TEMPO DE OP.</div><div class="m mv" id="tempoV">00:00</div>
  <div class="m lbl" id="acoesL">ACOES</div><div class="m mv" id="acoesV">0</div><div class="m" id="acoesU">ops</div>
  <div class="m lbl" id="cargaL">CARGA</div>
  <div class="bar"><i id="barFill"></i></div>
  <div class="m" id="cargaP" style="color:var(--faint)">0%</div>
  <div class="m" id="cargaS">em repouso</div>
  <div class="m lbl" id="apmL">APM</div><div class="m mv" id="apmV" style="color:var(--faint)">0</div>
  <div id="trend"></div><div class="m" id="apmPk">pico 0</div>
  <div id="spark"></div>
  <div class="divider"></div>
  <div class="m lbl" id="feedhead">// FLUXO DE TELEMETRIA</div>
  <div id="eventsC">EVENTOS 0000</div>
  <div id="feed"></div>
  <div class="crtline" id="crtline"></div>
</div>
<div id="bdot"></div>
<div id="bline"></div>
<div id="minicap">
  <canvas id="mreactor" width="88" height="88"></canvas>
  <div class="mt1" id="mt1">J.A.R.V.I.S.</div>
  <div class="mt2" id="mt2">ONLINE</div>
  <div class="mx" id="mx">×</div>
</div>
<script>
const fs = require('fs'), path = require('path');
let ipcRenderer = null; try { ipcRenderer = require('electron').ipcRenderer; } catch (e) {}
const Q = new URLSearchParams(location.search);
const SID = Q.get('sid') || 'global';
const DIR = Q.get('dir') || '.';
const MODE = Q.get('mode') || 'run';
const SHOTP = parseFloat(Q.get('p') || '0.3');
const P = (n) => path.join(DIR, n);
const DONE_CLOSE = 20000, IDLE_CLOSE = 600000, FEEDN = 8, HB = 1000;

// ---- estado ----
let title = '', startTs = 0, lastFeedTs = 0, feed = [], actions = 0, endShownAt = 0;
let actTs = [], apm = 0, apmPeak = 0, apmRef = 0, apmHist = new Array(10).fill(0), apmHistIdx = 0;
let spark = new Array(16).fill(0), load = 0, taskDone = 0, taskTotal = 0;
let loadPeak = 0;    // pico VU da carga: segura o maximo e decai (realismo de medidor)
let modelId = '';    // id do modelo real da sessao (etiqueta OPUS/SONNET/...)
let closing = false, bornMs = Date.now();
let minimized = false;   // colapsado na mini-capsula reator
let fable = false;   // sessao rodando o FABLE 5 (classe Mythos) -> visual especial
// transicao CINEMATICA entre modos: heat 0=normal .. 1=FABLE (onda + recolorir tudo)
let heat = 0, inTrans = false, transStart = 0, heatFrom = 0, heatTo = 0, modelInit = false;
const TRANS_MS = 1600;
function beginTrans() { inTrans = true; transStart = Date.now(); heatFrom = heat; heatTo = fable ? 1 : 0; requestAnimationFrame(fxLoop); }
const el = (id) => document.getElementById(id);

function readState() {
  try { const l = fs.readFileSync(P('meta.txt'), 'utf8').split('\n'); title = l[0] || ''; if (l[1]) { const t = Number(l[1].trim()); if (t) startTs = t; } } catch (e) {}
  // modo FABLE 5: statusline/hooks gravam o modelo da sessao em model.txt (linha 1 = id).
  // Mudou no meio da sessao? Dispara a transicao cinematica (a 1a leitura so posiciona).
  try {
    modelId = fs.readFileSync(P('model.txt'), 'utf8').split('\n')[0].trim().toLowerCase();
    const nf = modelId.includes('fable');
    if (!modelInit) { fable = nf; heat = nf ? 1 : 0; modelInit = true; }
    else if (nf !== fable) { fable = nf; beginTrans(); }
  } catch (e) { if (!modelInit) { fable = false; heat = 0; modelInit = true; } }
  try { const p = fs.readFileSync(P('progress.txt'), 'utf8').split('\t'); taskDone = Number(p[0]) || 0; taskTotal = Number(p[1]) || 0; } catch (e) {}
  try {
    const raw = fs.readFileSync(P('feed.txt'), 'utf8');
    const lines = raw.split('\n').filter(s => s.length);
    feed = []; actTs = []; actions = 0;
    for (const ln of lines) {
      const parts = ln.split('\t');
      const ts = Number(parts[0]) || 0, tag = parts[1] || '--', text = parts.slice(2).join('\t') || ln;
      feed.push([ts, tag, text]); lastFeedTs = ts; actTs.push(ts); actions++;
    }
    if (actTs.length > 300) actTs = actTs.slice(-300);
    if (feed.length > FEEDN + 2) feed = feed.slice(-(FEEDN + 2));
  } catch (e) {}
}

function recompute() {
  const now = Date.now(); let c60 = 0, c30 = 0; spark = new Array(16).fill(0);
  for (const t of actTs) { const d = now - t; if (d < 0) continue; if (d <= 60000) c60++; if (d <= 30000) c30++; if (d < 64000) { const i = 15 - Math.floor(d / 4000); if (i >= 0 && i < 16) spark[i]++; } }
  apm = c60; if (apm > apmPeak) apmPeak = apm; load = Math.min(1, c30 / 8);
  loadPeak = Math.max(load, Math.max(0, loadPeak - 0.06));   // pico VU: segura e decai ~6%/s
  apmRef = apmHist[apmHistIdx]; apmHist[apmHistIdx] = apm; apmHistIdx = (apmHistIdx + 1) % apmHist.length;
}

// etiqueta curta do modelo real da sessao (Fable ja tem o badge no titulo)
function shortModel(id) {
  if (!id || id.includes('fable')) return '';
  if (id.includes('opus')) return 'OPUS';
  if (id.includes('sonnet')) return 'SONNET';
  if (id.includes('haiku')) return 'HAIKU';
  return id.replace(/[^a-z0-9]/g, '').toUpperCase().slice(0, 8);
}

function tagColor(tag) {
  switch (tag) {
    case 'EDIT': return 'var(--amber)';
    case 'EXEC': case 'TEST': case 'AGNT': case 'JVS': case 'REQ': return 'var(--bright)';
    case 'DPLY': case 'END': return 'var(--red)';
    case 'GIT': case 'DONE': return 'var(--online)';
    default: return 'var(--mut)';
  }
}
function agoTxt() { if (lastFeedTs <= 0) return ''; let s = Math.floor((Date.now() - lastFeedTs) / 1000); if (s < 0) s = 0; if (s < 2) return 'agora'; if (s < 60) return 'ha ' + s + 's'; const m = Math.floor(s / 60); return 'ha ' + m + ':' + String(s % 60).padStart(2, '0'); }
function agoColor() { const s = (Date.now() - lastFeedTs) / 1000; return s < 8 ? 'var(--online)' : s < 30 ? 'var(--mut)' : 'var(--red)'; }
function elapsed() { if (startTs <= 0) return '00:00'; let s = Math.floor((Date.now() - startTs) / 1000); if (s < 0) s = 0; const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60; return h > 0 ? h + ':' + String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0') : String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0'); }
function fit(s, n) { s = String(s || ''); return s.length > n ? s.slice(0, n - 1) + '…' : s; }

function status() { if (fs.existsSync(P('end'))) return 'ENCERRADO'; return (Date.now() - lastFeedTs < 8000) ? 'OPERANDO' : 'ONLINE'; }

function renderDOM() {
  const st = status();
  // OVERHEAT (Fable 5): numeros incandescentes, brasa nos subtextos e status "PLENA CARGA"
  const VAL = fable ? '#FFD98A' : 'var(--amber)', EMB = fable ? '#FF7A3C' : 'var(--deep)';
  const scHex = st === 'OPERANDO' ? (fable ? '#FF7A3C' : '#E8B24A') : st === 'ENCERRADO' ? '#6C786E' : '#86E3A6';
  const sc = scHex;
  el('fbadge').style.display = (fable || heat > 0.02) ? 'inline-block' : 'none';
  el('fbadge').style.opacity = Math.max(0, Math.min(1, heat));
  el('hud').classList.toggle('fable', fable);
  el('stxt').textContent = (heat >= 0.5 && st === 'OPERANDO') ? 'PLENA CARGA' : st;
  el('stxt').style.color = sc; el('dot').style.background = sc;
  const rgb = parseInt(scHex.slice(1), 16), rr = rgb >> 16, gg = (rgb >> 8) & 255, bb = rgb & 255;   // capsula do status
  el('pill').style.borderColor = 'rgba(' + rr + ',' + gg + ',' + bb + ',.42)';
  el('pill').style.background = 'rgba(' + rr + ',' + gg + ',' + bb + ',.10)';
  el('hago').textContent = agoTxt(); el('hago').style.color = agoColor();
  const mtag = (heat < 0.5) ? shortModel(modelId) : '';
  el('mtag').textContent = mtag;
  el('sess').style.right = mtag ? '70px' : '14px';
  el('sess').textContent = title ? '// ' + title : '// sessao (CLI)';
  el('tempoV').textContent = elapsed(); el('tempoV').style.color = VAL;
  el('acoesV').textContent = actions; el('acoesV').style.color = VAL;
  el('acoesU').style.color = EMB; el('apmPk').style.color = EMB; el('cargaS').style.color = EMB; el('eventsC').style.color = EMB;
  const hasTasks = taskTotal > 0;
  el('cargaL').textContent = hasTasks ? 'ATIVIDADE' : 'CARGA';
  const pct = hasTasks ? (taskTotal ? taskDone / taskTotal : 0) : load;
  el('barFill').style.width = Math.max(pct > 0 ? 9 : 0, pct * 112) + 'px';
  el('barFill').style.background = fable ? 'linear-gradient(90deg,#B5471F,#FFD98A,#FFF4DC)' : '';
  el('cargaP').textContent = Math.round(pct * 100) + '%'; el('cargaP').style.color = pct > 0 ? VAL : 'var(--faint)';
  el('cargaS').textContent = hasTasks ? (taskDone + '/' + taskTotal) : (load > 0.05 ? (fable ? 'a plena carga' : 'reator ativo') : 'em repouso');
  const pk = el('peak');                                  // pico VU: marcador que segura e decai
  pk.style.opacity = (!hasTasks && loadPeak > 0.04) ? 0.9 : 0;
  pk.style.left = (210 + Math.min(111, 112 * loadPeak)) + 'px';
  pk.style.background = fable ? '#FFF4DC' : 'var(--bright)';
  el('apmV').textContent = apm; el('apmV').style.color = apm > 0 ? VAL : 'var(--faint)';
  el('apmPk').textContent = 'pico ' + apmPeak;
  const tr = apm - apmRef; el('trend').textContent = tr > 0 ? '▲' : tr < 0 ? '▼' : '—'; el('trend').style.color = tr > 0 ? 'var(--online)' : tr < 0 ? 'var(--red)' : 'var(--faint)';
  // sparkline
  const sp = el('spark'); if (sp.children.length !== 16) { sp.innerHTML = ''; for (let i = 0; i < 16; i++) sp.appendChild(document.createElement('i')); }
  let smax = 1; for (const v of spark) if (v > smax) smax = v;
  for (let i = 0; i < 16; i++) { const v = spark[i], bar = sp.children[i]; bar.style.height = (v <= 0 ? 2 : Math.max(3, (v / smax) * 15)) + 'px'; bar.style.background = v <= 0 ? 'rgba(108,120,110,.45)' : (i === 15 ? (fable ? '#FFF4DC' : 'var(--bright)') : i >= 11 ? (fable ? '#FFD98A' : 'var(--amber)') : i >= 6 ? (fable ? '#FF7A3C' : 'var(--mut)') : (fable ? '#B5471F' : 'var(--deep)'));
    bar.style.boxShadow = (i === 15 && v > 0) ? ('0 0 7px ' + (fable ? 'rgba(255,244,220,.55)' : 'rgba(244,194,92,.5)')) : 'none'; }   // halo no "agora"
  el('eventsC').textContent = 'EVENTOS ' + String(actions).padStart(4, '0');
  // feed
  const fc = el('feed'); fc.innerHTML = '';
  const start = Math.max(0, feed.length - FEEDN);
  if (feed.length === 0) { fc.innerHTML = '<div class="ftxt" style="color:var(--faint)">Aguardando telemetria da sessao...</div>'; }
  for (let i = start; i < feed.length; i++) {
    const f = feed[i], col = tagColor(f[1]);
    const row = document.createElement('div'); row.className = 'frow';
    const chip = document.createElement('span'); chip.className = 'chip'; chip.style.color = col; chip.textContent = f[1];
    const tx = document.createElement('span'); tx.className = 'ftxt'; tx.textContent = fit(f[2], 44);
    row.appendChild(chip); row.appendChild(tx);
    if (i === feed.length - 1) {                          // accent da linha mais nova (fade 3s)
      const ak = 1 - (Date.now() - f[0]) / 3000;
      if (ak > 0 && ak <= 1) { const acc = document.createElement('b'); acc.className = 'acc'; acc.style.opacity = ak.toFixed(2); row.appendChild(acc); }
    }
    fc.appendChild(row);
  }
  // mini-capsula (quando colapsado): titulo + status/tempo, paleta do modo
  if (minimized) {
    el('minicap').classList.toggle('fable', fable);
    el('mt1').textContent = title || 'J.A.R.V.I.S.'; el('mt1').style.color = fable ? '#FFD98A' : 'var(--amber)';
    el('mt2').textContent = ((fable && st === 'OPERANDO') ? 'PLENA CARGA' : st) + '  ' + elapsed();
    el('mt2').style.color = st === 'OPERANDO' ? (fable ? '#FF7A3C' : 'var(--amber)') : st === 'ENCERRADO' ? 'var(--faint)' : 'var(--online)';
  }
}

// ---- reator (canvas, animado) ----
const rc = el('reactor'), rctx = rc.getContext('2d');
let t0 = Date.now(), rspin = 0, rspinT = 0;
function mixc(a, b, k) { return a.map((v, i) => Math.round(v + (b[i] - v) * k)).join(','); }
function drawReactor() {
  const w = rc.width, h = rc.height, cx = w / 2, cy = h / 2, S = w / 80; // 2x DPR (canvas 160 p/ 80px)
  const phase = (Date.now() - t0) / 500;
  // REATIVO: gira mais rapido e brilha mais forte com a atividade real (carga + APM)
  const energy = Math.max(load, Math.min(1, apm / 45));
  const nowr = Date.now(); if (!rspinT) rspinT = nowr; rspin += (nowr - rspinT) / 1000 * (16 + 46 * energy) * Math.PI / 180; rspinT = nowr;
  const a = rspin, pulse = 0.5 + 0.5 * Math.sin(phase * (2.2 + 1.6 * energy)), rev = 0.72 + 0.5 * energy;
  // avanco da transicao de modo (heat desliza 0<->1; fora dela e constante)
  if (inTrans) {
    const t = (Date.now() - transStart) / TRANS_MS;
    if (t >= 1) { heat = heatTo; inTrans = false; el('hud').style.background = ''; }
    else { heat = heatFrom + (heatTo - heatFrom) * ease(t);
      el('hud').style.background = 'linear-gradient(150deg, rgb(' + mixc([18,31,23],[38,21,10],heat) + '), rgb(' + mixc([7,14,9],[15,6,3],heat) + '))'; }
  }
  // paleta interpolada pelo heat: ambar -> ouro-branco classe Mythos (espelha o nativo)
  const MAIN = mixc([232,178,74],[255,217,138],heat), HOT = mixc([244,194,92],[255,244,220],heat);
  rctx.clearRect(0, 0, w, h); rctx.save(); rctx.scale(S, S); rctx.translate(40, 40);
  // corona de OVERHEAT: brasa tremulando atras do nucleo (entra com o calor)
  if (heat > 0.02) {
    const fl = 0.55 + 0.45 * Math.sin(phase * 7.3) * Math.sin(phase * 3.1);
    rctx.beginPath(); rctx.arc(0, 0, 30, 0, 7); rctx.fillStyle = 'rgba(255,122,60,' + ((0.13 + 0.12 * fl) * heat).toFixed(3) + ')'; rctx.fill();
  }
  // halo + aros
  rctx.beginPath(); rctx.arc(0, 0, 24, 0, 7); rctx.fillStyle = 'rgba(' + HOT + ',' + (0.09 + 0.04 * heat + 0.07 * energy).toFixed(3) + ')'; rctx.fill();
  rctx.beginPath(); rctx.arc(0, 0, 30, 0, 7); rctx.strokeStyle = 'rgba(' + MAIN + ',.35)'; rctx.lineWidth = 1; rctx.stroke();
  rctx.beginPath(); rctx.arc(0, 0, 33, 0, 7); rctx.strokeStyle = 'rgba(201,168,119,.14)'; rctx.stroke();
  // ticks girando
  rctx.save(); rctx.rotate(a); rctx.strokeStyle = 'rgba(' + MAIN + ',.72)'; rctx.lineWidth = 2;
  for (let i = 0; i < 12; i++) { const r = i * Math.PI / 6; rctx.beginPath(); rctx.moveTo(Math.cos(r) * 25, Math.sin(r) * 25); rctx.lineTo(Math.cos(r) * 29, Math.sin(r) * 29); rctx.stroke(); } rctx.restore();
  // anel quebrado contra-girando
  rctx.save(); rctx.rotate(-a * 1.35); rctx.strokeStyle = 'rgba(' + HOT + ',.85)'; rctx.lineWidth = 2.3; rctx.lineCap = 'round';
  rctx.beginPath(); rctx.arc(0, 0, 21, 0.31, 2.34); rctx.stroke(); rctx.beginPath(); rctx.arc(0, 0, 21, 3.46, 5.49); rctx.stroke(); rctx.restore();
  // raios emanando + respirando (a contagem troca no meio da transicao, sob o flash)
  const RAYS = heat >= 0.5 ? 16 : 12, LENL = 16 + 2 * heat, LENS = 9.5 + 1.5 * heat;
  rctx.save(); rctx.rotate(a * 0.55); rctx.lineCap = 'round';
  for (let i = 0; i < RAYS; i++) { const ang = i * 2 * Math.PI / RAYS, lng = i % 2 === 0, len = (lng ? LENL : LENS) + pulse * (lng ? 4.5 : 2.5), al = Math.min(1, (lng ? .8 : .5) * (.55 + .45 * pulse) * rev); rctx.strokeStyle = 'rgba(' + (lng ? HOT : MAIN) + ',' + al.toFixed(2) + ')'; rctx.lineWidth = lng ? 2.1 : 1.4; rctx.beginPath(); rctx.moveTo(Math.cos(ang) * 3.2, Math.sin(ang) * 3.2); rctx.lineTo(Math.cos(ang) * len, Math.sin(ang) * len); rctx.stroke(); } rctx.restore();
  // DESCARGA eletrica sob carga (paridade com o nativo)
  if (energy > 0.12) { const dper = 3200 - 2100 * energy, dph = Date.now() % dper; if (dph < 200) { const dk = 1 - dph / 200, seed = Math.floor(Date.now() / 380), a0 = (seed * 2.3999) % (2 * Math.PI); rctx.save(); rctx.lineCap = 'round'; rctx.lineJoin = 'round'; const pts = []; for (let i = 0; i <= 5; i++) { const f = i / 5, ang = a0 + Math.sin(seed * 1.7 + i * 0.9) * 0.5, rad = 5 + 24 * f, jit = (i === 0 || i === 5) ? 0 : Math.sin(seed * 3.1 + i * 2.7) * 5; pts.push([Math.cos(ang) * rad + Math.cos(ang + 1.57) * jit, Math.sin(ang) * rad + Math.sin(ang + 1.57) * jit]); } rctx.strokeStyle = 'rgba(' + (heat >= 0.5 ? '255,244,220' : '255,224,150') + ',' + (0.35 * dk).toFixed(2) + ')'; rctx.lineWidth = 3.4; rctx.beginPath(); rctx.moveTo(pts[0][0], pts[0][1]); for (const q of pts) rctx.lineTo(q[0], q[1]); rctx.stroke(); rctx.strokeStyle = 'rgba(255,250,235,' + (0.9 * dk).toFixed(2) + ')'; rctx.lineWidth = 1.3; rctx.beginPath(); rctx.moveTo(pts[0][0], pts[0][1]); for (const q of pts) rctx.lineTo(q[0], q[1]); rctx.stroke(); rctx.restore(); } }
  // satelites Mythos: nascem/somem em fade junto com o calor
  if (heat > 0.02) {
    rctx.strokeStyle = 'rgba(255,217,138,' + (0.10 * heat).toFixed(3) + ')'; rctx.lineWidth = 1;
    rctx.beginPath(); rctx.arc(0, 0, 35, 0, 7); rctx.stroke();
    for (let i = 0; i < 3; i++) {
      const ang = -phase * 0.55 + i * 2 * Math.PI / 3;   // mesma velocidade do HUD nativo
      rctx.fillStyle = 'rgba(255,217,138,' + (0.31 * heat).toFixed(3) + ')'; rctx.beginPath(); rctx.arc(Math.cos(ang + .22) * 35, Math.sin(ang + .22) * 35, 1.3, 0, 7); rctx.fill();
      rctx.fillStyle = 'rgba(255,244,220,' + (0.92 * heat).toFixed(3) + ')'; rctx.beginPath(); rctx.arc(Math.cos(ang) * 35, Math.sin(ang) * 35, 2, 0, 7); rctx.fill();
    }
  }
  // glow radial + core (interpolados pelo heat)
  const gr = 13 + pulse * 4.5 + 3 * energy, g = rctx.createRadialGradient(0, 0, 0, 0, 0, gr); g.addColorStop(0, 'rgba(' + mixc([255,240,205],[255,248,228],heat) + ',' + Math.min(1, 0.6 + 0.3 * pulse + 0.15 * energy).toFixed(2) + ')'); g.addColorStop(1, 'rgba(' + MAIN + ',0)'); rctx.fillStyle = g; rctx.beginPath(); rctx.arc(0, 0, gr, 0, 7); rctx.fill();
  const pr = (4.6 + 0.6 * heat + 0.9 * energy) + pulse * (1.7 + 0.4 * heat); rctx.fillStyle = 'rgb(' + MAIN + ')'; rctx.beginPath(); rctx.arc(0, 0, pr, 0, 7); rctx.fill();
  rctx.fillStyle = 'rgb(' + mixc([255,248,232],[255,255,255],heat) + ')'; rctx.beginPath(); rctx.arc(0, 0, 2.2, 0, 7); rctx.fill();
  rctx.restore();
  if (minimized) drawMiniReactor(a, pulse, energy, MAIN, HOT);
  if (!closing || shutP < 0.42) requestAnimationFrame(drawReactor);
}

// mini reator da capsula colapsada (versao enxuta; le bem em ~44px)
const mrc = el('mreactor'), mrctx = mrc.getContext('2d');
function drawMiniReactor(a, pulse, energy, MAIN, HOT) {
  const w = mrc.width, S = w / 44; mrctx.clearRect(0, 0, w, w); mrctx.save(); mrctx.scale(S, S); mrctx.translate(22, 22);
  mrctx.beginPath(); mrctx.arc(0, 0, 16, 0, 7); mrctx.fillStyle = 'rgba(' + HOT + ',' + Math.min(1, 0.14 + 0.1 * pulse + 0.1 * energy).toFixed(2) + ')'; mrctx.fill();
  mrctx.beginPath(); mrctx.arc(0, 0, 18, 0, 7); mrctx.strokeStyle = 'rgba(' + MAIN + ',.35)'; mrctx.lineWidth = 1; mrctx.stroke();
  mrctx.save(); mrctx.rotate(a); mrctx.strokeStyle = 'rgba(' + MAIN + ',.7)'; mrctx.lineWidth = 1.6; for (let i = 0; i < 8; i++) { const r = i * Math.PI / 4; mrctx.beginPath(); mrctx.moveTo(Math.cos(r) * 14, Math.sin(r) * 14); mrctx.lineTo(Math.cos(r) * 17.5, Math.sin(r) * 17.5); mrctx.stroke(); } mrctx.restore();
  mrctx.save(); mrctx.rotate(-a * 1.4); mrctx.strokeStyle = 'rgba(' + HOT + ',.85)'; mrctx.lineWidth = 1.8; mrctx.lineCap = 'round'; mrctx.beginPath(); mrctx.arc(0, 0, 12, 0.35, 2.6); mrctx.stroke(); mrctx.restore();
  mrctx.save(); mrctx.rotate(a * 0.55); mrctx.lineCap = 'round'; for (let i = 0; i < 8; i++) { const ang = i * Math.PI / 4, len = 8 + pulse * 2.5; mrctx.strokeStyle = 'rgba(' + (i % 2 ? MAIN : HOT) + ',' + Math.min(1, 0.6 + 0.4 * pulse).toFixed(2) + ')'; mrctx.lineWidth = 1.3; mrctx.beginPath(); mrctx.moveTo(Math.cos(ang) * 2.5, Math.sin(ang) * 2.5); mrctx.lineTo(Math.cos(ang) * len, Math.sin(ang) * len); mrctx.stroke(); } mrctx.restore();
  const gr = 6 + pulse * 2.5, g = mrctx.createRadialGradient(0, 0, 0, 0, 0, gr); g.addColorStop(0, 'rgba(255,244,214,' + Math.min(1, 0.65 + 0.3 * pulse).toFixed(2) + ')'); g.addColorStop(1, 'rgba(' + MAIN + ',0)'); mrctx.fillStyle = g; mrctx.beginPath(); mrctx.arc(0, 0, gr, 0, 7); mrctx.fill();
  const pr = 2.6 + 0.7 * energy + pulse * 1.2; mrctx.fillStyle = 'rgb(' + MAIN + ')'; mrctx.beginPath(); mrctx.arc(0, 0, pr, 0, 7); mrctx.fill();
  mrctx.restore();
}

// ---- FX da transicao de modo: onda de choque + flash + letreiro (canvas por cima) ----
const fxc = el('fx'), fctx = fxc.getContext('2d');
function fxLoop() {
  if (!inTrans) { fctx.clearRect(0, 0, 760, 600); return; }
  const t = Math.min(1, (Date.now() - transStart) / TRANS_MS), up = heatTo > heatFrom;
  fctx.clearRect(0, 0, 760, 600); fctx.save(); fctx.scale(2, 2);
  const cx = 52, cy = 90;
  for (let i = 0; i < 2; i++) {
    const tt = (t - i * 0.14) / 0.86; if (tt <= 0 || tt >= 1) continue;
    const r = 10 + tt * 420;
    fctx.beginPath(); fctx.arc(cx, cy, r, 0, 7);
    fctx.strokeStyle = (up ? 'rgba(255,180,90,' : 'rgba(150,210,245,') + (0.6 * (1 - tt)).toFixed(3) + ')';
    fctx.lineWidth = 9 * (1 - tt) + 1.5; fctx.stroke();
  }
  if (t < 0.24) {
    const k = 1 - t / 0.24, fr = 16 + 34 * (t / 0.24);
    fctx.beginPath(); fctx.arc(cx, cy, fr, 0, 7);
    fctx.fillStyle = (up ? 'rgba(255,244,220,' : 'rgba(210,238,255,') + (0.67 * k).toFixed(3) + ')'; fctx.fill();
  }
  const a2 = Math.sin(Math.PI * t);
  fctx.font = '700 9px Consolas, monospace';
  fctx.fillStyle = (up ? 'rgba(255,244,220,' : 'rgba(159,196,220,') + (0.9 * a2).toFixed(3) + ')';
  fctx.fillText(up ? '// ENGAJANDO PROTOCOLO FABLE 5' : '// FABLE 5 RECOLHIDO AO COFRE', 15, 280);
  fctx.restore();
  requestAnimationFrame(fxLoop);
}

// ---- desligamento (esfria + colapso CRT), dirigido por JS p/ casar com o QA ----
function ease(t) { return t * t * (3 - 2 * t); }
function coldFilter(t) { return 'grayscale(' + (.85 * t).toFixed(3) + ') sepia(' + (.5 * t).toFixed(3) + ') hue-rotate(' + Math.round(190 * t) + 'deg) contrast(' + (1 - .12 * t).toFixed(3) + ')'; }   // frio AZUL-ACO (mata o verde da tinta)
let shutP = 0;
function shutdownFrame(p) {
  shutP = p = Math.max(0, Math.min(1, p));
  const hud = el('hud'), crt = el('crtline'); let filter = '', tf = 'scaleY(1)', line = 0;
  if (p < 0.44) { const t = ease(p / 0.44); filter = coldFilter(t) + ' brightness(' + (1 - .5 * t).toFixed(3) + ')'; }
  else if (p < 0.80) { const t = (p - 0.44) / 0.36, sy = Math.max(0.02, 1 - t * t); filter = coldFilter(1) + ' brightness(' + (.5 + .95 * t).toFixed(3) + ')'; tf = 'scaleY(' + sy.toFixed(3) + ')'; line = t; }
  else if (p < 0.93) { const t = (p - 0.80) / 0.13, sx = Math.max(0.01, 1 - t * t); filter = coldFilter(1) + ' brightness(1.5)'; tf = 'scaleY(0.02) scaleX(' + sx.toFixed(3) + ')'; line = 1 - t; }
  else { const t = (p - 0.93) / 0.07; filter = 'brightness(2)'; tf = 'scaleY(0.02) scaleX(0.02)'; hud.style.opacity = (1 - t).toFixed(2); }
  hud.style.filter = filter; hud.style.transform = tf; crt.style.opacity = line.toFixed(2);
}
function beginShutdown() {
  if (closing) return; closing = true; const start = Date.now(), DUR = 1500;
  (function step() { const p = (Date.now() - start) / DUR; shutdownFrame(Math.min(1, p)); if (p >= 1) { try { ipcRenderer && ipcRenderer.send('hud-close'); } catch (e) {} return; } requestAnimationFrame(step); })();
}

// ---- IGNICAO (boot): espelho QUENTE do desligamento — fisga de luz -> linha CRT ->
// abertura vertical -> aquecimento + flare do nucleo. One-shot de ~1.4s na abertura.
function bootFrame(p) {
  p = Math.max(0, Math.min(1, p));
  const hud = el('hud'), dot = el('bdot'), line = el('bline'), flare = el('bootflare'), btxt = el('boottext');
  if (p >= 1) { dot.style.display = 'none'; line.style.opacity = 0; flare.style.opacity = 0; btxt.style.opacity = 0; hud.style.filter = ''; hud.style.transform = ''; hud.style.opacity = 1; return; }
  if (p < 0.10) {                                        // 1) fisga: um ponto de luz acende
    const t = p / 0.10;
    hud.style.opacity = 0; line.style.opacity = 0;
    dot.style.display = 'block'; dot.style.opacity = t.toFixed(2); dot.style.transform = 'scale(' + (0.3 + 0.9 * t).toFixed(2) + ')';
    return;
  }
  dot.style.display = 'none';
  if (p < 0.26) {                                        // 2) ponto -> linha
    const t = (p - 0.10) / 0.16, e2 = 1 - (1 - t) * (1 - t);
    hud.style.opacity = 0;
    line.style.opacity = 1; line.style.transform = 'scaleX(' + Math.max(0.02, e2).toFixed(3) + ')';
    return;
  }
  if (p < 0.54) {                                        // 3) abertura vertical (CRT ao contrario)
    const t = (p - 0.26) / 0.28, e2 = 1 - (1 - t) * (1 - t);
    line.style.opacity = (1 - t).toFixed(2);
    hud.style.opacity = 1;
    hud.style.transform = 'scaleY(' + Math.max(0.02, e2).toFixed(3) + ')';
    hud.style.filter = coldFilter(0.85 * (1 - t)) + ' brightness(' + (0.55 + 0.45 * t).toFixed(3) + ')';
    return;
  }
  {                                                      // 4) aquecimento + flare do nucleo
    const t = (p - 0.54) / 0.46;
    line.style.opacity = 0;
    hud.style.opacity = 1; hud.style.transform = '';
    const s = 0.85 * (1 - Math.min(1, t * 1.35));
    hud.style.filter = s > 0.004 ? coldFilter(s) : '';
    const fk = Math.sin(Math.PI * Math.min(1, t / 0.75));
    flare.style.opacity = (0.9 * fk).toFixed(2);
    flare.style.transform = 'scale(' + (0.5 + 1.7 * t).toFixed(2) + ')';
    btxt.textContent = t < 0.5 ? (fable ? '// PROTOCOLO FABLE 5' : '// IGNICAO DO NUCLEO') : '// SISTEMAS ONLINE';
    btxt.style.opacity = Math.max(0, 1 - t * t).toFixed(2);
    btxt.style.color = t < 0.5 ? 'var(--mut)' : 'var(--online)';
  }
}
function beginBoot() {
  const start = Date.now(), DUR = 1400;
  bootFrame(0);
  (function step() { if (closing) { bootFrame(1); return; } const p = (Date.now() - start) / DUR; bootFrame(Math.min(1, p)); if (p < 1) requestAnimationFrame(step); })();
}

// ---- tick de dados + ciclo de vida (1x/s) ----
function beat() { try { fs.writeFileSync(P('hb'), String(Date.now())); } catch (e) {} }
function tick() {
  if (closing) return;
  readState(); recompute(); renderDOM(); beat();
  if (fs.existsSync(P('closed'))) { try { ipcRenderer && ipcRenderer.send('hud-close'); } catch (e) {} return; }
  if (fs.existsSync(P('end'))) { if (!endShownAt) endShownAt = Date.now(); if (Date.now() - endShownAt > 20000) return beginShutdown(); }
  else { try { const d = fs.readFileSync(P('done'), 'utf8').trim(); const dt = Number(d); if (dt && Date.now() - dt > DONE_CLOSE) return beginShutdown(); } catch (e) {} }
  if (!fs.existsSync(P('end')) && Date.now() - Math.max(lastFeedTs, bornMs) > IDLE_CLOSE) return beginShutdown();
  try { fs.statSync(DIR); } catch (e) { return beginShutdown(); }
}

// ---- seed p/ QA (--shot) ----
function seed() {
  title = 'Claude Code'; startTs = Date.now() - (7 * 60 + 23) * 1000;
  fable = Q.get('fable') === '1'; heat = fable ? 1 : 0; modelInit = true;   // QA do modo FABLE 5
  const now = Date.now(); const off = [12, 9, 6.5, 4.2, 1.1];
  const tags = [['REQ', 'Deixar o HUD do Jarvis melhor'], ['READ', 'Lendo main.js'], ['EDIT', 'Editando index.html'], ['EXEC', 'npm install electron'], ['JVS', fable ? 'Operando em forca total, senhor.' : 'Renderizando com as especificacoes, senhor.']];
  feed = []; actTs = []; actions = 0;
  const bigOff = [1, 3, 4, 7, 9, 12, 15, 19, 24, 30, 38, 47, 58];
  for (const o of bigOff) { actTs.push(now - o * 1000); actions++; }
  for (let i = 0; i < tags.length; i++) { feed.push([now - off[i] * 1000, tags[i][0], tags[i][1]]); }
  lastFeedTs = now - 1100; recompute();
}

// ---- minimizar / restaurar ----
el('min').addEventListener('click', (e) => { e.stopPropagation(); minimized = true; document.body.classList.add('minimized'); try { ipcRenderer && ipcRenderer.send('hud-min', true); } catch (er) {} });
el('minicap').addEventListener('click', () => { minimized = false; document.body.classList.remove('minimized'); try { ipcRenderer && ipcRenderer.send('hud-min', false); } catch (er) {} });
el('mx').addEventListener('click', (e) => { e.stopPropagation(); try { fs.writeFileSync(P('closed'), '1'); } catch (er) {} try { ipcRenderer && ipcRenderer.send('hud-close'); } catch (er) {} });

// ---- boot ----
el('close').addEventListener('click', () => { try { fs.writeFileSync(P('closed'), '1'); } catch (e) {} try { ipcRenderer && ipcRenderer.send('hud-close'); } catch (e) {} });
drawReactor();
if (Q.get('mini') === '1') { minimized = true; document.body.classList.add('minimized'); }   // QA da mini-capsula
if (MODE === 'shot' || MODE === 'shotshut' || MODE === 'shotboot') {
  seed(); renderDOM();
  if (MODE === 'shotshut') { shutdownFrame(SHOTP); }
  if (MODE === 'shotboot') { bootFrame(SHOTP); }
} else {
  tick(); setInterval(tick, HB);
  if (!minimized) beginBoot();                           // ignicao so no modo cheio; minimizada abre direto como capsula
}
</script>
