<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;width:512px;height:512px;overflow:hidden;background:#0A0F0C}
  svg{display:block}
</style></head><body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- fundo escuro com vinheta -->
    <radialGradient id="bg" cx="50%" cy="46%" r="62%">
      <stop offset="0%"  stop-color="#12211A"/>
      <stop offset="55%" stop-color="#0D1612"/>
      <stop offset="100%" stop-color="#070B09"/>
    </radialGradient>
    <!-- âmbar radial do núcleo -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFF4DA"/>
      <stop offset="28%" stop-color="#F4CE7A"/>
      <stop offset="60%" stop-color="#E8B24A"/>
      <stop offset="100%" stop-color="#A87228" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D08C"/>
      <stop offset="100%" stop-color="#A87228"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- disco de fundo -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#1C2C24" stroke-width="1.5"/>

  <!-- brilho difuso central -->
  <circle cx="256" cy="256" r="150" fill="url(#core)" opacity="0.28" filter="url(#softglow)"/>

  <!-- anel externo segmentado (HUD) -->
  <circle cx="256" cy="256" r="206" fill="none" stroke="#C9A877" stroke-width="2"
          stroke-opacity="0.55" stroke-dasharray="2 10" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="194" fill="none" stroke="#8A6A34" stroke-width="1"
          stroke-opacity="0.6" stroke-dasharray="34 20"/>

  <!-- marcas de tique (12 direções, estilo mostrador) -->
  <g stroke="#E8B24A" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85">
    <g transform="rotate(0 256 256)"><line x1="256" y1="66"  x2="256" y2="88"/></g>
    <g transform="rotate(30 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(60 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(90 256 256)"><line x1="256" y1="66"  x2="256" y2="88"/></g>
    <g transform="rotate(120 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(150 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(180 256 256)"><line x1="256" y1="66"  x2="256" y2="88"/></g>
    <g transform="rotate(210 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(240 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(270 256 256)"><line x1="256" y1="66"  x2="256" y2="88"/></g>
    <g transform="rotate(300 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
    <g transform="rotate(330 256 256)"><line x1="256" y1="72" x2="256" y2="86"/></g>
  </g>

  <!-- anel médio "quebrado" do reator (2 arcos com folga) -->
  <g filter="url(#glow)" fill="none" stroke="url(#amber)" stroke-width="7" stroke-linecap="round">
    <path d="M 256 100 A 156 156 0 0 1 397 190"/>
    <path d="M 256 412 A 156 156 0 0 1 115 322"/>
  </g>
  <g fill="none" stroke="#E8B24A" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round">
    <path d="M 397 322 A 156 156 0 0 1 300 405"/>
    <path d="M 115 190 A 156 156 0 0 1 212 107"/>
  </g>

  <!-- anel interno fino -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="#C9A877" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- TRIÂNGULO do reator (assinatura Jarvis) -->
  <g filter="url(#glow)">
    <polygon points="256,163 342,306 170,306" fill="none" stroke="url(#amber)"
             stroke-width="9" stroke-linejoin="round"/>
    <polygon points="256,196 314,292 198,292" fill="none" stroke="#F4CE7A"
             stroke-width="3" stroke-linejoin="round" stroke-opacity="0.8"/>
  </g>

  <!-- núcleo incandescente -->
  <circle cx="256" cy="262" r="34" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="256" cy="262" r="12" fill="#FFF7E4"/>

  <!-- cantos HUD (aparecem no ícone quadrado do Menu Iniciar) -->
  <g stroke="#C9A877" stroke-width="3" stroke-opacity="0.45" fill="none" stroke-linecap="round">
    <path d="M 40 78 L 40 40 L 78 40"/>
    <path d="M 472 78 L 472 40 L 434 40"/>
    <path d="M 40 434 L 40 472 L 78 472"/>
    <path d="M 472 434 L 472 472 L 434 472"/>
  </g>
</svg>
</body></html>
